<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Wave - Minimalist Life Log</title>
		<style>
			:root {
				--bg-color: #121214;
				--panel-bg: #1a1a1e;
				--text-color: #e2e2e6;
				--text-muted: #8e8e93;
				--border-color: #2c2c30;
				--accent-color: #fff;
			}
			
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			
			body {
				background-color: var(--bg-color);
				color: var(--text-color);
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				overflow-x: hidden;
			}
			
			/* アプリコンテナ */
			.app-container {
				width: 100%;
				max-width: 480px;
				display: flex;
				flex-direction: column;
				min-height: 100vh;
				position: relative;
			}
			
			/* ヘッダー・コントロールパネル */
			header {
				background-color: var(--panel-bg);
				padding: 24px;
				border-bottom: 1px solid var(--border-color);
				position: sticky;
				top: 0;
				z-index: 100;
				box-shadow: 0 4px 20px rgba(0,0,0,0.3);
			}
			
			h1 {
				font-size: 1.2rem;
				font-weight: 300;
				letter-spacing: 0.15em;
				margin-bottom: 20px;
				text-align: center;
				text-transform: uppercase;
				color: var(--text-color);
			}
			
			.picker-group {
				display: flex;
				justify-content: space-between;
				gap: 16px;
				margin-bottom: 20px;
			}
			
			.picker-item {
				flex: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 8px;
			}
			
			.picker-item label {
				font-size: 0.75rem;
				color: var(--text-muted);
				letter-spacing: 0.05em;
			}
			
			/* カスタムカラーピッカーのラップ */
			.color-wrapper {
				position: relative;
				width: 100%;
				height: 44px;
				border-radius: 8px;
				overflow: hidden;
				border: 1px solid var(--border-color);
				cursor: pointer;
				transition: transform 0.2s;
			}
			.color-wrapper:hover {
				transform: scale(1.02);
			}
			
			input[type="color"] {
				position: absolute;
				top: -10px;
				left: -10px;
				width: calc(100% + 20px);
				height: calc(100% + 20px);
				border: none;
				background: none;
				cursor: pointer;
			}
			
			/* ノート入力欄 */
			.note-input-container {
				margin-bottom: 20px;
			}
			input[type="text"] {
				width: 100%;
				background-color: var(--bg-color);
				border: 1px solid var(--border-color);
				border-radius: 6px;
				padding: 12px;
				color: var(--text-color);
				font-size: 0.9rem;
				outline: none;
				transition: border-color 0.2s;
			}
			input[type="text"]:focus {
				border-color: var(--text-muted);
			}
			input[type="text"]::placeholder {
				color: #48484a;
			}
			
			/* 保存ボタン */
			.save-btn {
				width: 100%;
				background-color: var(--text-color);
				color: var(--bg-color);
				border: none;
				border-radius: 6px;
				padding: 14px;
				font-size: 0.95rem;
				font-weight: 500;
				letter-spacing: 0.05em;
				cursor: pointer;
				transition: opacity 0.2s, transform 0.1s;
			}
			.save-btn:hover {
				opacity: 0.9;
			}
			.save-btn:active {
				transform: scale(0.99);
			}
			
			/* 地層（タイムライン）コンテナ */
			.strata-timeline {
				flex: 1;
				display: flex;
				flex-direction: column;
				justify-content: flex-end; /* 下側から色が積み重なるように配置 */
				background-color: #0b0b0c;
				min-height: 200px;
			}
			
			/* 地層の1本の縞 */
			.strata-stripe {
				width: 100%;
				height: 16px; /* 地層としての美しさを保つ細さ */
				cursor: pointer;
				position: relative;
				transition: opacity 0.2s, height 0.2s;
				transform-origin: bottom;
			}
			.strata-stripe:hover {
				height: 24px; /* 触れた時に少し広がるインタラクション */
				z-index: 10;
				box-shadow: 0 0 15px rgba(0,0,0,0.5);
			}
			
			/* 過去を肯定する：同調パルスアニメーション */
			@keyframes pulse-glow {
				0% { box-shadow: inset 0 0 0px rgba(255,255,255,0); filter: brightness(1); }
				50% { box-shadow: inset 0 0 10px rgba(255,255,255,0.8); filter: brightness(1.4); }
				100% { box-shadow: inset 0 0 0px rgba(255,255,255,0); filter: brightness(1); }
			}
			.pulse-active {
				animation: pulse-glow 2s infinite ease-in-out;
				z-index: 5;
			}
			
			/* 未来が現在を肯定する：ポップオーバー・タイムカプセル（JS追従型ツールチップ） */
			.capsule-tooltip {
				position: fixed;
				background-color: rgba(28, 28, 30, 0.95);
				border: 1px solid #2c2c30;
				padding: 12px 16px;
				border-radius: 8px;
				width: 260px;
				box-shadow: 0 10px 30px rgba(0,0,0,0.6);
				pointer-events: none;
				opacity: 0;
				visibility: hidden;
				transition: opacity 0.15s ease, transform 0.15s ease;
				z-index: 1000; /* ヘッダー(100)よりも前面に表示 */
				backdrop-filter: blur(8px);
				-webkit-backdrop-filter: blur(8px);
			}
			.capsule-tooltip.visible {
				opacity: 1;
				visibility: visible;
			}
			
			.popover-date {
				font-size: 0.75rem;
				color: var(--text-muted);
				margin-bottom: 6px;
				letter-spacing: 0.05em;
			}
			.popover-note {
				font-size: 0.85rem;
				color: var(--text-color);
				margin-bottom: 8px;
				line-height: 1.4;
				word-wrap: break-word;
			}
			.popover-note.empty {
				color: #48484a;
				font-style: italic;
			}
			.popover-auras {
				display: flex;
				gap: 6px;
				align-items: center;
			}
			.aura-dot {
				width: 12px;
				height: 12px;
				border-radius: 50%;
				border: 1px solid rgba(255,255,255,0.1);
			}
			
			/* 投稿時の全画面フェードグラデーション（演出用） */
			.splash-overlay {
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				pointer-events: none;
				z-index: 999;
				opacity: 0;
				transition: opacity 1s ease-out;
			}
			
			/* 空白状態のガイド */
			.empty-guide {
				padding: 40px;
				text-align: center;
				color: #3a3a3c;
				font-size: 0.9rem;
				letter-spacing: 0.05em;
				font-weight: 300;
				margin: auto;
			}
		</style>
	</head>
	<body>
		
		<div class="app-container">
			<header>
				<h1>Wave</h1>
				
				<div class="picker-group">
					<div class="picker-item">
						<label>Strata (Core)</label>
						<div class="color-wrapper">
							<input type="color" id="color1" value="#4a90e2">
						</div>
					</div>
					<div class="picker-item">
						<label>Aura 1</label>
						<div class="color-wrapper">
							<input type="color" id="color2" value="#50e3c2">
						</div>
					</div>
					<div class="picker-item">
						<label>Aura 2</label>
						<div class="color-wrapper">
							<input type="color" id="color3" value="#b8e986">
						</div>
					</div>
				</div>
				
				<div class="note-input-container">
					<input type="text" id="noteInput" placeholder="言葉をカプセルに埋める（任意）" maxLength="30" autoComplete="off">
				</div>
				
				<button class="save-btn" id="saveBtn">Save Wave</button>
			</header>
			
			<div class="strata-timeline" id="timeline">
			</div>
		</div>
		
		<div class="splash-overlay" id="splash"></div>
		<div id="tooltip" class="capsule-tooltip"></div>
		
		<script>
			// DOM要素の取得
			const color1Input = document.getElementById('color1');
			const color2Input = document.getElementById('color2');
			const color3Input = document.getElementById('color3');
			const noteInput = document.getElementById('noteInput');
			const saveBtn = document.getElementById('saveBtn');
			const timeline = document.getElementById('timeline');
			const splash = document.getElementById('splash');
			const tooltip = document.getElementById('tooltip');
			
			// ローカルストレージキー名
			const STORAGE_KEY = 'wave_log_data';
			
			// データの読み込み
			let waveLogs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
			
			// 初期化処理
			initApp();
			
			function initApp() {
				renderTimeline();
				setupColorMatchListener();
			}
			
			// タイムラインの描画（地層のスタック処理）
			function renderTimeline() {
				timeline.innerHTML = '';
				
				if (waveLogs.length === 0) {
					timeline.innerHTML = '<div class="empty-guide">あなたの波長がここに堆積します</div>';
					return;
				}
				
				// 日付の新しい順（降順）に並び替えて描画
				const sortedLogs = [...waveLogs].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
				
				sortedLogs.forEach((log, index) => {
						const stripe = document.createElement('div');
						stripe.className = 'strata-stripe';
						stripe.style.backgroundColor = log.primaryColor;
						stripe.setAttribute('data-color', log.primaryColor.toLowerCase());
						
						// 未来が現在を肯定する：タイムカプセル・ツールチップのイベント設定
						stripe.addEventListener('mouseenter', (e) => {
							tooltip.innerHTML = '';
							
							const dateEl = document.createElement('div');
							dateEl.className = 'popover-date';
							dateEl.textContent = formatDate(log.timestamp);
							
							const noteEl = document.createElement('div');
							noteEl.className = 'popover-note';
							if (log.note && log.note.trim() !== "") {
								noteEl.textContent = log.note;
							} else {
								noteEl.textContent = "言葉なき一日";
								noteEl.classList.add('empty');
							}
							
							const aurasEl = document.createElement('div');
							aurasEl.className = 'popover-auras';
							
							// 3色すべてを表示（コアカラー[primaryColor] ＋ Auraの2色[displayColors]）
							const allColors = [log.primaryColor, ...log.displayColors];
							allColors.forEach(clr => {
								const dot = document.createElement('div');
								dot.className = 'aura-dot';
								dot.style.backgroundColor = clr;
								aurasEl.appendChild(dot);
							});
							
							tooltip.appendChild(dateEl);
							tooltip.appendChild(noteEl);
							tooltip.appendChild(aurasEl);
							
							tooltip.classList.add('visible');
							updateTooltipPosition(e);
						});
						
						stripe.addEventListener('mousemove', (e) => {
							updateTooltipPosition(e);
						});
						
						stripe.addEventListener('mouseleave', () => {
							tooltip.classList.remove('visible');
						});
						
						timeline.appendChild(stripe);
						
						// 下側（最古）から順に柔らかく出現させるためのウェーブ遅延効果
						const delay = Math.min((sortedLogs.length - 1 - index) * 0.03, 0.8);
						
						// 柔らかい出現アニメーションの適用（Web Animations APIを使用することで、CSSのホバーや過去の同調パルスと競合しない）
						stripe.animate([
							{ opacity: 0, transform: 'scaleY(0) translateY(12px)' },
							{ opacity: 1, transform: 'scaleY(1) translateY(0)' }
						], {
							duration: 1000,
							easing: 'cubic-bezier(0.16, 1, 0.3, 1)', // 柔らかく減速するイージング
							delay: delay * 1000,
							fill: 'both'
						});
				});
			}
			
			// 保存アクション
			saveBtn.addEventListener('click', () => {
					const primaryColor = color1Input.value;
					const displayColors = [color2Input.value, color3Input.value];
					const note = noteInput.value;
					
					// タイムスタンプ（今日の日付 YYYY-MM-DD）
					const todayStr = new Date().toISOString().split('T')[0];
					
					// 同じ日に複数投稿された場合は上書きする（1日1地層ルールを復活）
					waveLogs = waveLogs.filter(log => log.timestamp !== todayStr);
					
					const newLog = {
						id: 'wave_' + Date.now(),
						timestamp: todayStr,
						primaryColor: primaryColor,
						displayColors: displayColors,
						note: note
					};
					
					waveLogs.push(newLog);
					localStorage.setItem(STORAGE_KEY, JSON.stringify(waveLogs));
					
					// 3色が溶け出す演出（Splash Animation）
					triggerSplash(primaryColor, displayColors[0], displayColors[1]);
					
					// 画面の更新
					renderTimeline();
					noteInput.value = ''; // 入力欄のリセット
			});
			
			// 過去を肯定する：カラーマッチング・リスナー（リアルタイム同調処理）
			function setupColorMatchListener() {
				// コアカラーの色を変えた時に、過去の同じ波長を共鳴させる
				color1Input.addEventListener('input', (e) => {
						const currentHex = e.target.value.toLowerCase();
						resonatePastStrata(currentHex);
				});
			}
			
			function resonatePastStrata(targetHex) {
				const stripes = document.querySelectorAll('.strata-stripe');
				stripes.forEach(stripe => {
						const stripeColor = stripe.getAttribute('data-color');
						
						// 完全一致、またはカラーコードの近似値（今回はシンプルに完全一致ベース）で判定
						if (stripeColor === targetHex) {
							stripe.classList.add('pulse-active');
						} else {
							stripe.classList.remove('pulse-active');
						}
				});
			}
			
			// 投稿時のグラデーションフェード演出
			function triggerSplash(c1, c2, c3) {
				splash.style.background = `linear-gradient(135deg, ${c1}, ${c2}, ${c3})`;
				splash.style.opacity = '0.6';
				
				setTimeout(() => {
						splash.style.opacity = '0';
				}, 1000);
			}
			
			// ツールチップの位置をマウス位置に追従させる（はみ出し防止ロジック付き）
			function updateTooltipPosition(e) {
				const tooltipWidth = tooltip.offsetWidth || 260;
				const tooltipHeight = tooltip.offsetHeight || 100;
				
				// マウスの少し右上（カーソルと重ならないように調整）
				let x = e.clientX + 16;
				let y = e.clientY - tooltipHeight - 16;
				
				// 画面右端からはみ出る場合の補正
				if (x + tooltipWidth > window.innerWidth) {
					x = e.clientX - tooltipWidth - 16;
				}
				
				// 画面上端からはみ出る場合の補正
				if (y < 0) {
					y = e.clientY + 16; // マウスの下側に表示
				}
				
				tooltip.style.left = x + 'px';
				tooltip.style.top = y + 'px';
			}
			
			// 日付フォーマットのユーティリティ
			function formatDate(dateStr) {
				const d = new Date(dateStr);
				const year = d.getFullYear();
				const month = String(d.getMonth() + 1).padStart(2, '0');
				const day = String(d.getDate()).padStart(2, '0');
				return `${year}.${month}.${day}`;
			}
		</script>
	</body>
</html>
